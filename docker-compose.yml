version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sportsbetting_db
    environment:
      MYSQL_DATABASE: sportsbetting
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOTPASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$DB_USERNAME", "-p$DB_PASSWORD"]
      timeout: 5s
      retries: 10
      interval: 5s

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: sportsbetting_backend
    ports:
      - "8443:8443"
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/sportsbetting?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
      - ODDS_API_KEY=${ODDS_API_KEY}
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000
      - SPRING_MAIL_HOST=sandbox.smtp.mailtrap.io
      - SPRING_MAIL_PORT=2525
      - MAILTRAP_SMTP_USERNAME=${MAILTRAP_SMTP_USERNAME}
      - MAILTRAP_SMTP_PASSWORD=${MAILTRAP_SMTP_PASSWORD}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
      - SOCIALDATA_API_KEY=${SOCIALDATA_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_SYSTEM_PROMPT=${GEMINI_SYSTEM_PROMPT}
      - APIFY_API_TOKEN=${APIFY_API_TOKEN}
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
      - ./sportsbetting.p12:/app/sportsbetting.p12
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sportsbetting_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data: