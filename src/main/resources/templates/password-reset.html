<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resetowanie hasła</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333;">
    <h2>Witaj!</h2>
    <p>Otrzymaliśmy prośbę o zresetowanie hasła do Twojego konta w SportsBettingManager.</p>
    <p>Aby ustawić nowe hasło, kliknij w poniższy link (link jest ważny przez 24 godziny):</p>
    <p>
        <a th:href="${resetLink}" style="display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px;">
            Zresetuj hasło
        </a>
    </p>
    <p>Jeśli to nie Ty prosiłeś o reset hasła, zignoruj tę wiadomość.</p>
    <p>Pozdrawiamy,<br/>Zespół SportsBettingManager</p>
</body>
</html>
