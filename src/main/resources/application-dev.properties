# Profil DEV — szybsze iteracje testów E2E auto-rozliczania zakładów.
# Uruchamiany przez Dockerfile: mvn spring-boot:run -Dspring-boot.run.profiles=dev
#
# Cooldown jest > 0 celowo: nawet w testach NIE chcemy odpytywać Apify o ten sam
# zakład w każdym cyklu (każde wywołanie actora ~$0.08). Interwał krótszy niż prod,
# by szybciej widzieć efekty, ale dzięki cooldownowi cykle bez kwalifikujących się
# zakładów nie generują żadnych wywołań Apify.
bet.resolution.interval-ms=600000
bet.resolution.search-cooldown-hours=1
bet.resolution.max-apify-calls-per-cycle=8
# Mniejsze batche — 15 query w jednym wywołaniu przekracza timeout actora (300s).
bet.resolution.search-batch-size=8
# Lokalny Docker: pozwala wywołać POST /api/bets/run-auto-resolution bez JWT (tylko dev).
bet.resolution.dev-open-endpoint=true
bet.resolution.debug-endpoints=true
bet.resolution.match-confidence-threshold=0.82
bet.resolution.match-confidence-threshold-tennis=0.80
# Krótszy cooldown ręcznego przycisku w dev (prod: 60 min).
bet.resolution.manual-cooldown-minutes=15
# Przy starcie dev: uzupełnij market_type / event_name na istniejących PENDING (BetImportResolutionEnricher).
bet.resolution.backfill-on-startup=true
# Bet buildery wymagają statystyk meczu (StatisticsMarketResolver).
bet.resolution.enrichment-enabled=true
bet.resolution.max-enrichment-calls-per-cycle=5
