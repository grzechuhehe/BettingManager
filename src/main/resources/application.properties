spring.datasource.url=jdbc:mysql://localhost:3306/zaklady?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Logowanie debugowania
logging.level.org.springframework.security=DEBUG
logging.level.com.grzechuhehe.SportsBettingManagerApp=DEBUG
logging.level.org.springframework.web=DEBUG

app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION:604800000}

# SSL Configuration
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=file:./sportsbetting.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=sportsbetting


# Static resource configuration
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080