spring.datasource.url=jdbc:mysql://localhost:3306/sportsbetting?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logowanie
logging.level.org.springframework.security=INFO
logging.level.com.grzechuhehe.SportsBettingManagerApp=DEBUG
logging.level.org.springframework.web=INFO

# Bezpieczenstwo (JWT)
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION:604800000}

odds.api.key=${ODDS_API_KEY:dummy-key-for-tests}
odds.api.base-url=https://api.the-odds-api.com/v4

# SSL Configuration
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=file:./sportsbetting.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD:dummy-pass}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=sportsbetting

# Statyczne zasoby
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080

# Email Configuration (Mailtrap DEV default)
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAILTRAP_SMTP_USERNAME:dummylogin}
spring.mail.password=${MAILTRAP_SMTP_PASSWORD:dummypass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Integracje API (X oraz AI)
gemini.api.key=${GEMINI_API_KEY:dummy}
gemini.system.prompt=${GEMINI_SYSTEM_PROMPT}
socialdata.api.key=${SOCIALDATA_API_KEY:dummy}

# Apify (SofaScore) — auto-rozliczanie zakładów.
# UWAGA: to są wartości PRODUKCYJNE (bezpieczne kosztowo). Szybkie iteracje testów E2E
# trzymamy w application-dev.properties (Docker uruchamia profil `dev`).
apify.api.token=${APIFY_API_TOKEN:${APIFY_API_KEY:dummy-apify-token}}
apify.api.base-url=https://api.apify.com/v2
apify.actor.sofascore=abotapi~sofascore-scraper
# search + proxy ON — tryb scheduled u actora crashuje (404 SofaScore)
apify.sofascore.use-apify-proxy=true
# Timeouty HTTP — run-sync actora potrafi trwać do kilku minut
apify.api.connect-timeout-ms=15000
apify.api.read-timeout-ms=300000
bet.resolution.interval-ms=21600000
bet.resolution.match-confidence-threshold=0.85
bet.resolution.match-confidence-threshold-default=0.85
bet.resolution.match-confidence-threshold-tennis=0.80
bet.resolution.date-window-days=4
bet.resolution.max-bets-per-run=50
bet.resolution.apify-mode=search
bet.resolution.scheduled-sports=football,basketball,tennis,ice-hockey
bet.resolution.scheduled-max-items=400
bet.resolution.search-batch-size=8
bet.resolution.cache-ttl-hours=72
bet.resolution.scheduled-max-days-back=7
# Cooldown > 0 jest kluczowy kosztowo: bez niego ten sam (często niedopasowywalny)
# zakład PENDING idzie do Apify w każdym cyklu.
bet.resolution.search-cooldown-hours=24
bet.resolution.min-hours-after-placed=3
# Batch search: max unikalnych query na cykl (15 query = 1 wywołanie actora ~$0.08)
bet.resolution.max-search-queries=15
bet.resolution.max-apify-calls-per-cycle=5
# Min. odstęp między ręcznymi uruchomieniami auto-rozliczania z UI (Apify kosztuje).
bet.resolution.manual-cooldown-minutes=60

# Upload zdjęć kuponów (import zakładu z obrazu)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
