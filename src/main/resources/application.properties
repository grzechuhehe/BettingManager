spring.datasource.url=jdbc:mysql://localhost:3306/sportsbetting?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logowanie
logging.level.org.springframework.security=INFO
logging.level.com.grzechuhehe.SportsBettingManagerApp=DEBUG
logging.level.org.springframework.web=INFO

# Bezpieczeństwo (JWT)
app.jwtSecret=${JWT_SECRET:d3ZreGVodWhlaGUtc3BvcnRzLWJldHRpbmctbWFuYWdlci1hcHAta2V5LXNlY3JldC1mb3ItZGV2ZWxvcG1lbnQ=}
app.jwtExpirationMs=${JWT_EXPIRATION:604800000}

# SSL Configuration
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=file:./sportsbetting.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD:dummy-pass}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=sportsbetting

# Statyczne zasoby
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
