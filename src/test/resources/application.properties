# Konfiguracja bazy danych dla testow
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sportsbetting?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:testuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:testpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Konfiguracja JWT dla testow
app.jwtSecret=${JWT_SECRET:test-secret-key-1234567890-test-only-for-ci-and-dev}
app.jwtExpirationMs=604800000

# Konfiguracja SSL dla testow
server.ssl.enabled=false
server.port=8080

# Konfiguracja JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Odds API
odds.api.key=${ODDS_API_KEY:dummy-key-for-tests}
odds.api.base-url=https://api.the-odds-api.com/v4

# CORS
app.cors.allowed-origins=http://localhost:3000

# Mock Email properties for tests
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test

gemini.api.key=${GEMINI_API_KEY:dummy}
socialdata.api.key=${SOCIALDATA_API_KEY:dummy}
