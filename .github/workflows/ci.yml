name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-build-and-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    # Skonfigurujemy środowisko, aby MySQL był dostępny dla testów
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: sportsbetting
          MYSQL_ROOT_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Cache maven dependencies to speed up subsequent builds

      - name: Run Maven Tests
        env:
          # Przekazujemy zmienne środowiskowe, których wymaga nasza konfiguracja
          DB_USERNAME: root
          DB_PASSWORD: testpassword
          JWT_SECRET: DummMySecretForGitHubActionsTestingEnvironment123
          KEYSTORE_PASSWORD: dummy_password
        run: mvn -B test

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
